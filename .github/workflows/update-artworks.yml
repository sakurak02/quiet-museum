name: Update artworks data

on:
  push:
    branches:
      - main
    paths:
      - "images/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-artworks-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-artworks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate artworks data
        run: node scripts/generate-artworks.js

      - name: Verify generated changes
        shell: bash
        run: |
          changed_files="$(git diff --name-only)"
          if [[ -n "$changed_files" && "$changed_files" != "js/artworks.js" ]]; then
            echo "Unexpected files were changed:"
            echo "$changed_files"
            exit 1
          fi

      - name: Commit and push the generated file
        shell: bash
        run: |
          if git diff --quiet -- js/artworks.js; then
            echo "js/artworks.js is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add js/artworks.js
          git commit -m "Automatically update artworks.js"
          git push origin "HEAD:${GITHUB_REF_NAME}"
